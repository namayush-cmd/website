<!DOCTYPE html>
<html>
<head>
    <title>Upload Candidate Application</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .file-input {
            margin: 20px 0;
        }

        input[type="file"] {
            border: 2px dashed #ccc;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="file"]:hover {
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        button:hover {
            background: #5a67d8;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>

</head>
<body>

<div class="container">
    <h2>📄 Upload Candidate Application</h2>

    <form action="/process" method="post" enctype="multipart/form-data">
        
        <div class="file-input">
            <input type="file" name="file" required>
        </div>

        <button type="submit">🚀 Upload File</button>
    </form>

    <div class="footer">
        Supported: PDF, DOC, Images
    </div>
</div>

</body>
</html>
