<!DOCTYPE html>
<html>
<head>
    <title>SAAP App</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background: #f5f7fa;
        }

        .box {
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 300px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 10px 25px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #45a049;
        }

        .section-title {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .resource-card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        .card-header {
            background: linear-gradient(90deg, #4CAF50, #2ecc71);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
        }

        .card-body {
            max-height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
        }

        .card-body p {
            margin: 5px 0;
            padding: 6px 10px;
            background: white;
            border-left: 4px solid #4CAF50;
            border-radius: 5px;
            font-size: 14px;
        }

        .card-body p:nth-child(even) {
            background: #f0fdf4;
        }
    </style>
</head>

<body>
<form id="uploadForm" onsubmit="event.preventDefault(); run();">
<div class="box">
    <h3>Select State</h3>
    <select id="state" required>
        <option value="">-- Select State --</option>

        <option value="Andhra Pradesh">Andhra Pradesh</option>
        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
        <option value="Assam">Assam</option>
        <option value="Bihar">Bihar</option>
        <option value="Chhattisgarh">Chhattisgarh</option>
        <option value="Goa">Goa</option>
        <option value="Gujarat">Gujarat</option>
        <option value="Haryana">Haryana</option>
        <option value="Himachal Pradesh">Himachal Pradesh</option>
        <option value="Jharkhand">Jharkhand</option>
        <option value="Karnataka">Karnataka</option>
        <option value="Kerala">Kerala</option>
        <option value="Madhya Pradesh">Madhya Pradesh</option>
        <option value="Maharashtra">Maharashtra</option>
        <option value="Manipur">Manipur</option>
        <option value="Meghalaya">Meghalaya</option>
        <option value="Mizoram">Mizoram</option>
        <option value="Nagaland">Nagaland</option>
        <option value="Odisha">Odisha</option>
        <option value="Punjab">Punjab</option>
        <option value="Rajasthan">Rajasthan</option>
        <option value="Sikkim">Sikkim</option>
        <option value="Tamil Nadu">Tamil Nadu</option>
        <option value="Telangana">Telangana</option>
        <option value="Tripura">Tripura</option>
        <option value="Uttar Pradesh">Uttar Pradesh</option>
        <option value="Uttarakhand">Uttarakhand</option>
        <option value="West Bengal">West Bengal</option>
        <option value="Andaman & Nicobar Islands">Andaman & Nicobar Islands</option>
        <option value="Chandigarh">Chandigarh</option>
        <option value="DNH & DD">Dadra & Nagar Haveli and Daman & Diu</option>
        <option value="Delhi">Delhi</option>
        <option value="Jammu & Kashmir">Jammu & Kashmir</option>
        <option value="Ladakh">Ladakh</option>
        <option value="Lakshadweep">Lakshadweep</option>
        <option value="Puducherry">Puducherry</option>
    </select>
</div>



<div class="box">
    <h3>Upload SAAP</h3>
    <input type="file" id="saap" accept="application/pdf">
    <br><br>
    <iframe id="saapPreview"></iframe>
</div>

<div class="box">
    <h3>Upload Resource Pool</h3>
    <input type="file" id="resource" accept="application/pdf">
    <br><br>
    <iframe id="resourcePreview"></iframe>
</div>

<div class="box">
    <div id="loading" style="display:none; color:green; font-weight:bold;">
        ⏳ Processing... Please wait
    </div>
    <button type="button" onclick="run()">Run</button>
</div>

</form>

<div class="box">
    <h3>Result</h3>
    <div id="result"></div>
</div>

<script>
const saapInput = document.getElementById("saap");
const resourceInput = document.getElementById("resource");

let saapURL = null;
let resourceURL = null;

// ✅ Safe preview function
function previewFile(file, iframe, type) {

    // Old URL cleanup
    if (type === "saap" && saapURL) {
        URL.revokeObjectURL(saapURL);
    }
    if (type === "resource" && resourceURL) {
        URL.revokeObjectURL(resourceURL);
    }

    const url = URL.createObjectURL(file);

    if (type === "saap") saapURL = url;
    else resourceURL = url;

    iframe.src = url;

    // Delay revoke (safe for PDF)
    setTimeout(() => {
        URL.revokeObjectURL(url);
    }, 5000);
}

// Preview SAAP
saapInput.onchange = () => {
    const file = saapInput.files[0];
    if (file) {
        previewFile(file, document.getElementById("saapPreview"), "saap");
    }
};

// Preview Resource
resourceInput.onchange = () => {
    const file = resourceInput.files[0];
    if (file) {
        previewFile(file, document.getElementById("resourcePreview"), "resource");
    }
};

// ✅ Strong file validation
function isPDF(file) {
    return file && (
        file.type === "application/pdf" ||
        file.name.toLowerCase().endsWith(".pdf")
    );
}

let isRunning = false; // prevent multiple clicks

function run() {

    if (isRunning) return;
    isRunning = true;
	const btn = document.querySelector("button");
    btn.disabled = true;
    btn.innerText = "Processing...";

    const state = document.getElementById("state").value;
	if (!state) {
    alert("Please select state");
    reset();
    return;
}
    const saap = saapInput.files[0];
    const resource = resourceInput.files[0];

    const loading = document.getElementById("loading");

    // ❗ Common reset function (clean code)
    function reset() {
        isRunning = false;
        btn.disabled = false;
        btn.innerText = "Run";
        loading.style.display = "none";
    }

    // ✅ Null check
    if (!saap || !resource) {
        alert("Please upload both files");
        reset();
        return;
    }

    // ✅ File type check
    if (!isPDF(saap)) {
        alert("SAAP must be PDF");
        reset();
        return;
    }

    if (!isPDF(resource)) {
        alert("Resource must be PDF");
        reset();
        return;
    }

    loading.style.display = "block";

    const formData = new FormData();
    formData.append("state", state);
    formData.append("saap", saap);
    formData.append("resource", resource);

    fetch("/process", {
        method: "POST",
        body: formData
    })
    .then(res => {
        if (!res.ok) throw new Error("Server error");
        return res.json();
    })
    .then(data => {
		console.log(data);  // 👈 YAHAN LAGAO
        if (data.error) {
            alert(data.error);
            reset();
            return;
        }

		const resultDiv = document.getElementById("result");

		document.getElementById("result").innerHTML =
			"<pre>" + JSON.stringify(data, null, 2) + "</pre>";

		if (data.file_ready) {
			window.location.href = "/download";
		}


        reset(); // 👈 SUCCESS RESET
    })
    .catch(err => {
        alert("Error: " + err.message);
        console.error(err);

        reset(); // 👈 ERROR RESET
    });
}
</script>
</body>
</html>
