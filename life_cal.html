<!DOCTYPE html>
<html>
<head>
    <title>Life Analysis System</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        .container {
            width: 420px;
            margin: 40px auto;
            background: #ffffff15;
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            color: #ffd700;
        }

        input, textarea {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: orange;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: darkorange;
        }

        label {
            font-size: 14px;
        }

        .latlon {
            display: flex;
            gap: 10px;
        }

        .latlon input {
            width: 50%;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Life Analysis System</h2>

    <form action="/analyze" method="post" enctype="multipart/form-data">

        <label>Name</label>
        <input name="name" placeholder="Enter your name" required>

        <label>Date of Birth</label>
        <input name="dob" type="date" required>

        <label>Birth Time</label>
        <input name="birth_time" type="time" required>

        <label>Birth Place</label>
        <input id="birth_place" name="birth_place" placeholder="City / Village" onblur="fetchLatLon()" required>

        <label>Latitude & Longitude</label>
        <div class="latlon">
            <input id="lat" name="lat" placeholder="Latitude" readonly>
            <input id="lon" name="lon" placeholder="Longitude" readonly>
        </div>

        <label>Current Location</label>
        <input name="current_place" placeholder="Where you live now">

        <label>Thinking Style</label>
        <input name="thinking" placeholder="positive / neutral / negative">

        <label>Habits</label>
        <textarea name="habits" placeholder="e.g. reading, gym, procrastination"></textarea>

        <label>Goal</label>
        <input name="goal" placeholder="Your main goal">

        <label>Upload Hand Image</label>
        <input type="file" name="hand_image">

        <br><br>
        <button type="submit">Analyze</button>

    </form>
</div>

<script>
async function fetchLatLon() {
    let place = document.getElementById("birth_place").value;

    if (!place) return;

    let url = `https://nominatim.openstreetmap.org/search?q=${place}&format=json`;

    try {
        let res = await fetch(url);
        let data = await res.json();

        if (data.length > 0) {
            document.getElementById("lat").value = data[0].lat;
            document.getElementById("lon").value = data[0].lon;
        }
    } catch (err) {
        console.log("Error fetching location");
    }
}
</script>

</body>
</html>
